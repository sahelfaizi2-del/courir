<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Cyber Security Dashboard</title>
<style>
    body {
        margin: 0;
        font-family: Arial, sans-serif;
        background-color: #0d1117;
        color: #c9d1d9;
    }

    header {
        background: #161b22;
        padding: 15px;
        text-align: center;
        font-size: 20px;
        border-bottom: 1px solid #30363d;
    }

    .container {
        display: flex;
    }

    .sidebar {
        width: 220px;
        background: #161b22;
        padding: 20px;
        height: 100vh;
        border-right: 1px solid #30363d;
    }

    .sidebar h3 {
        color: #58a6ff;
    }

    .sidebar p {
        margin: 15px 0;
        cursor: pointer;
    }

    .main {
        flex: 1;
        padding: 20px;
    }

    .card {
        background: #161b22;
        padding: 20px;
        margin-bottom: 20px;
        border-radius: 10px;
        border: 1px solid #30363d;
    }

    .status {
        color: #238636;
        font-weight: bold;
    }

    .warning {
        color: #f85149;
    }

    button {
        padding: 10px;
        border: none;
        background: #238636;
        color: white;
        cursor: pointer;
        border-radius: 5px;
    }

</style>
</head>
<body>

<header>
    🔐 Cyber Security Dashboard
</header>

<div class="container">

    <div class="sidebar">
        <h3>Menu</h3>
        <p>📊 Dashboard</p>
        <p>🛡️ Protection</p>
        <p>⚠️ Alertes</p>
        <p>⚙️ Paramètres</p>
    </div>

    <div class="main">

        <div class="card">
            <h2>État du système</h2>
            <p class="status">✔ Aucun problème détecté</p>
        </div>

        <div class="card">
            <h2>Menaces récentes</h2>
            <p class="warning">⚠ Tentative d'accès bloquée</p>
            <p class="warning">⚠ Scan suspect détecté</p>
        </div>

        <div class="card">
            <h2>Analyse rapide</h2>
            <button onclick="scan()">Lancer un scan</button>
            <p id="scanResult"></p>
        </div>

    </div>

</div>

<script>
function scan() {
    const result = document.getElementById("scanResult");
    result.innerText = "Analyse en cours...";

    setTimeout(() => {
        result.innerText = "✔ Système sécurisé - aucune menace active";
    }, 2000);
}
</script>

</body>
</html>
