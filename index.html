<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>SAHEL</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #0a0f1c;
    color: white;
}

header {
    background: #111827;
    padding: 20px;
    text-align: center;
    font-size: 28px;
    color: #00ffc3;
}

nav {
    text-align: center;
    padding: 10px;
    background: #020617;
}

nav a {
    margin: 0 15px;
    color: white;
    text-decoration: none;
}

nav a:hover {
    color: #00ffc3;
}

.hero {
    text-align: center;
    padding: 80px 20px;
}

.hero h1 {
    font-size: 50px;
}

button {
    padding: 12px 20px;
    background: #00ffc3;
    border: none;
    cursor: pointer;
}

.container {
    display: flex;
    justify-content: center;
    gap: 20px;
    padding: 40px;
    flex-wrap: wrap;
}

.card {
    background: #111827;
    padding: 20px;
    border-radius: 10px;
    width: 250px;
}
</style>

</head>

<body>

<header>SAHEL</header>

<nav>
<a href="index.html">Accueil</a>
<a href="services.html">Services</a>
<a href="contact.html">Contact</a>
</nav>

<section class="hero">
<h1>Bienvenue chez SAHEL</h1>
<p>Innovation • Sécurité • Technologie</p>

<button onclick="scan()">Lancer analyse</button>
<p id="result"></p>
</section>

<div class="container">
<div class="card">🔐 Cybersécurité avancée</div>
<div class="card">🌐 Réseaux sécurisés</div>
<div class="card">⚡ Solutions rapides</div>
</div>

<script>
function scan() {
    let result = document.getElementById("result");
    result.innerText = "Analyse en cours...";

    setTimeout(() => {
        result.innerText = "✔ Système sécurisé";
    }, 2000);
}
</script>

</body>
</html>
