</div>

<div class="terminal" id="terminal">
> Initialisation...
</div>

<script>
function startScan() {
    const term = document.getElementById("terminal");

    let logs = [
        "Scan des ports...",
        "Analyse du trafic réseau...",
        "Détection intrusion...",
        "Vérification système...",
        "✔ Système sécurisé"
    ];

    let i = 0;

    function loop() {
        if(i < logs.length){
            term.innerHTML += "<br>> " + logs[i];
            term.scrollTop = term.scrollHeight;
            i++;
            setTimeout(loop, 700);
        }
    }

    loop();
}
</script>
